name: Shared Spec Update

on:
  workflow_call:
    inputs:
      type:
        required: true
        type: string

env:
  PHP_VERSION: '8.3'

permissions: {}

jobs:
  update-spec:
    name: Update spec
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      - name: Run standard update command
        env:
          TYPE: ${{ inputs.type }}
        run: composer run update-spec-$TYPE

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: |
            Automatic ${{ inputs.type }} spec update from upstream changes
          delete-branch: true
          title: |
            Automatic ${{ inputs.type }} spec update
          branch: update-spec/${{ inputs.type }}
          body: |
            This PR makes sure the content of this package is updated with upstream changes in the specs.
          labels: |
            spec-update
            automated pr
          reviewers: prinsfrank
