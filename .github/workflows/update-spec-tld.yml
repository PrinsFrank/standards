name: Daily TLD update

on:
  workflow_dispatch:
  schedule:
    - cron: '55 17 * * *'
      timezone: 'Europe/Amsterdam'

permissions: {}

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  update-specs:
    uses: ./.github/workflows/reusable-update-spec.yml
    permissions:
      contents: write # to create pull requests
      pull-requests: write # to create pull requests
    with:
      type: tld
